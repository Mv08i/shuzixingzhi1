<body>

    <div class="container">
        <div class="header">

        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="number" id="numberInput" placeholder="Enter a number (integers, decimals, negatives supported)">
                <input type="number" id="gcdInput" placeholder="GCD comparison number (default 100)" min="1" value="100">
                <button onclick="analyzeNumber()">Analyze</button>
            </div>

        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">

    <script>
        function isPrime(n) {
            if (!Number.isInteger(n) || n <= 1) return false;
            if (n <= 3) return true;
            if (n % 2 === 0 || n % 3 === 0) return false;
            let i = 5;
            while (i * i <= n) {
                if (n % i === 0 || n % (i + 2) === 0) return false;
                i += 6;
            }
            return true;
        }

        function getFactors(n) {
            if (!Number.isInteger(n) || n <= 0) return [];
            const factors = [];
            for (let i = 1; i <= Math.sqrt(n); i++) {
                if (n % i === 0) {
                    factors.push(i);
                    if (i !== n / i) factors.push(n / i);
                }
            }
            return factors.sort((a, b) => a - b);
        }

        function getMultiples(n, count = 10) {
            const multiples = [];
            for (let i = 1; i <= count; i++) {
                multiples.push((n * i).toFixed(2));
            }
            return multiples;
        }

        function isPerfect(n) {
            if (!Number.isInteger(n) || n <= 0) return false;
            const factors = getFactors(n);
            const sum = factors.reduce((acc, f) => acc + f, 0) - n;
            return sum === n;
        }

        function isSquare(n) {
            if (n < 0) return { isSquare: false, root: null };
            const root = Math.sqrt(n);
            return { isSquare: root % 1 === 0, root: root };
        }

        function getDigitSum(n) {
            const absStr = Math.abs(n).toString().replace('.', '');
            return absStr.split('').reduce((acc, d) => acc + parseInt(d), 0);
        }

        function getDigitProduct(n) {
            const absStr = Math.abs(n).toString().replace('.', '');
            if (absStr.includes('0')) return 0;
            return absStr.split('').reduce((acc, d) => acc * parseInt(d), 1);
        }

        function getGCDwith(n, m) {
            if (!Number.isInteger(n) || !Number.isInteger(m) || n <= 0 || m <= 0) return [];
            const commonFactors = [];
            const min = Math.min(n, m);
            for (let i = 1; i <= min; i++) {
                if (n % i === 0 && m % i === 0) {
                    commonFactors.push(i);
                }
            }
            return commonFactors;
        }

        function isEven(n) {
            return n % 2 === 0;
        }

        function getPrimeFactors(n) {
            if (!Number.isInteger(n) || n <= 1) return [];
            const factors = [];
            let num = n;
            while (num % 2 === 0) {
                factors.push(2);
                num /= 2;
            }
            let i = 3;
            while (i * i <= num) {
                while (num % i === 0) {
                    factors.push(i);
                    num /= i;
                }
                i += 2;
            }
            if (num > 1) factors.push(num);
            return factors;
        }

        function getDecimalPrimeFactors(n) {
            if (n <= 0) return null;
            const str = n.toString();
            const decimalIndex = str.indexOf('.');
            let denominator = 1;
            let numerator = n;
            
            if (decimalIndex !== -1) {
                const decimalPlaces = str.length - decimalIndex - 1;
                denominator = Math.pow(10, decimalPlaces);
                numerator = Math.round(n * denominator);
            }
            
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const commonDivisor = gcd(numerator, denominator);
            numerator = numerator / commonDivisor;
            denominator = denominator / commonDivisor;
            
            const numeratorFactors = getPrimeFactors(numerator);
            const denominatorFactors = getPrimeFactors(denominator);
            
            const formatFactors = (factors) => {
                if (factors.length === 0) return '1';
                const counts = {};
                factors.forEach(f => counts[f] = (counts[f] || 0) + 1);
                return Object.entries(counts)
                    .map(([k, v]) => v === 1 ? k : `${k}^${v}`)
                    .join(' × ');
            };
            
            return {
                original: n,
                fraction: `${numerator}/${denominator}`,
                numerator: numerator,
                denominator: denominator,
                numeratorFactors: formatFactors(numeratorFactors),
                denominatorFactors: formatFactors(denominatorFactors)
            };
        }

        function isInteger(n) {
            return Number.isInteger(n);
        }

        function isPositive(n) {
            return n > 0;
        }

        function isNegative(n) {
            return n < 0;
        }

        function getAbsoluteValue(n) {
            return Math.abs(n);
        }

        function getFloor(n) {
            return Math.floor(n);
        }

        function getCeil(n) {
            return Math.ceil(n);
        }

        function getRound(n) {
            return Math.round(n);
        }

        function analyzeNumber() {
            const input = document.getElementById('numberInput');
            const gcdInput = document.getElementById('gcdInput');
            const errorMsg = document.getElementById('errorMessage');
            const resultSection = document.getElementById('resultSection');
            const displayNumber = document.getElementById('displayNumber');
            const propertiesGrid = document.getElementById('propertiesGrid');

            const num = parseFloat(input.value);
            const gcdNum = parseInt(gcdInput.value) || 100;

            // 输入验证
            if (isNaN(num)) {
                errorMsg.classList.add('show');
                errorMsg.textContent = 'Please enter a valid number';
                resultSection.classList.remove('show');
                return;
            }

            // 限制数字大小，防止 DoS 攻击
            const MAX_VALUE = 1e12;
            if (Math.abs(num) > MAX_VALUE) {
                errorMsg.classList.add('show');
                errorMsg.textContent = `Number too large. Please enter a number less than ${MAX_VALUE.toLocaleString()}`;
                resultSection.classList.remove('show');
                return;
            }

            // 限制 GCD 比较数字大小
            if (gcdNum > MAX_VALUE || gcdNum < 1) {
                errorMsg.classList.add('show');
                errorMsg.textContent = 'GCD comparison number must be between 1 and ' + MAX_VALUE.toLocaleString();
                resultSection.classList.remove('show');
                return;
            }

            errorMsg.classList.remove('show');
            displayNumber.textContent = num;

            const isInt = isInteger(num);
            const isPos = isPositive(num);
            const isNeg = isNegative(num);
            const squareResult = isSquare(num);

            const properties = [
                { 
                    title: 'Sign', 
                    value: isPos ? 'Positive' : (isNeg ? 'Negative' : 'Zero'),
                    className: isPos ? 'prime' : (isNeg ? 'composite' : '')
                },
                { 
                    title: 'Type', 
                    value: isInt ? 'Integer' : 'Decimal',
                    className: isInt ? 'even' : 'odd'
                },
                { 
                    title: 'Absolute Value', 
                    value: isNeg ? getAbsoluteValue(num) : 'Same as itself'
                }
            ];

            if (isInt) {
                properties.push(
                    { 
                        title: 'Parity', 
                        value: isEven(num) ? 'Even' : 'Odd',
                        className: isEven(num) ? 'even' : 'odd'
                    },
                    { 
                        title: 'Prime/Composite', 
                        value: num <= 1 ? 'Not applicable for numbers ≤ 1' : (isPrime(num) ? 'Prime' : 'Composite'),
                        className: num > 1 && isPrime(num) ? 'prime' : 'composite'
                    },
                    { 
                        title: 'Factors', 
                        value: num > 0 ? getFactors(num).join(', ') : 'Not applicable for non-positive',
                        isList: true
                    },
                    { 
                        title: 'First 10 Multiples', 
                        value: getMultiples(num).join(', '),
                        isList: true
                    },
                    { 
                        title: 'Perfect Number', 
                        value: num > 0 ? (isPerfect(num) ? 'Is perfect number' : 'Not perfect number') : 'Not applicable for non-positive',
                        className: num > 0 && isPerfect(num) ? 'perfect' : ''
                    },
                    { 
                        title: 'Square Number', 
                        value: num < 0 ? 'Not applicable for negative' : (squareResult.isSquare ? `Is square of ${squareResult.root}` : 'Not a square number'),
                        className: num >= 0 && squareResult.isSquare ? 'square' : ''
                    },
                    { 
                        title: 'Digit Sum', 
                        value: getDigitSum(num)
                    },
                    { 
                        title: 'Digit Product', 
                        value: getDigitProduct(num)
                    },
                    { 
                        title: `Common Factors with ${gcdNum}`, 
                        value: num > 0 ? getGCDwith(num, gcdNum).join(', ') : 'Not applicable for non-positive',
                        isList: true
                    },
                    { 
                        title: 'Prime Factorization', 
                        value: num > 1 ? getPrimeFactors(num).join(' × ') : 'Not applicable for numbers ≤ 1'
                    }
                );
            } else {
                const decimalFactors = isPos ? getDecimalPrimeFactors(num) : null;
                const factorsText = decimalFactors 
                    ? `${decimalFactors.fraction} = ${decimalFactors.numeratorFactors} / ${decimalFactors.denominatorFactors}`
                    : 'Not applicable for non-positive';
                
                properties.push(
                    { 
                        title: 'Integer Part', 
                        value: Math.floor(num)
                    },
                    { 
                        title: 'Decimal Part', 
                        value: (num - Math.floor(num)).toFixed(10).replace(/0+$/, '').replace(/\.$/, '') || '0'
                    },
                    { 
                        title: 'Floor', 
                        value: getFloor(num)
                    },
                    { 
                        title: 'Ceiling', 
                        value: getCeil(num)
                    },
                    { 
                        title: 'Round', 
                        value: getRound(num)
                    },
                    { 
                        title: 'First 10 Multiples', 
                        value: getMultiples(num).join(', '),
                        isList: true
                    },
                    { 
                        title: 'Digit Sum', 
                        value: getDigitSum(num)
                    },
                    { 
                        title: 'Digit Product', 
                        value: getDigitProduct(num)
                    },
                    { 
                        title: 'Prime Factorization', 
                        value: factorsText,
                        className: 'prime'
                    },
                    { 
                        title: 'Square Number', 
                        value: squareResult.isSquare ? `Is square of ${squareResult.root}` : 'Not a square number',
                        className: squareResult.isSquare ? 'square' : ''
                    }
                );
            }

            propertiesGrid.innerHTML = properties.map(prop => `
                <div class="property-card ${prop.className || ''}">
                    <div class="title">${prop.title}</div>
                    <div class="value ${prop.isList ? 'list' : ''}">${prop.value}</div>
                </div>
            `).join('');

            resultSection.classList.add('show');
            input.value = '';
        }

        document.getElementById('numberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeNumber();
            }
        });
    </script>
